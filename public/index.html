<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Live dashboard</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/styles.css" />
    <script src="/marked.min.js" defer></script>
  </head>
  <body>
    <div class="wrap">
      <header class="top">
        <div class="top-title">
          <h1>Live dashboard</h1>
          <span class="date" id="meta-date">…</span>
        </div>

        <div class="top-actions">
          <div class="action-group">
            <button
              class="refresh-btn"
              id="collapse-all-btn"
              title="Toggle all stack cards (open/closed)"
            >
              ⊟ Collapse all
            </button>
            <button
              class="refresh-btn"
              id="toggle-notepad-btn"
              title="Hide the right-side notepad to give the main column more room"
            >
              📓 Hide notepad
            </button>
            <button
              class="refresh-btn"
              id="refresh-btn"
              title="Refresh data (no Claude calls — same as auto)"
            >
              ↻ Refresh
            </button>
            <label
              class="auto-toggle"
              title="Auto-refresh every 10 minutes (data only, no Claude)"
            >
              <input type="checkbox" id="auto-refresh-cb" checked />
              <span>Auto (10m)</span>
            </label>
            <span
              class="freshness"
              id="freshness"
              title="Last data refresh"
            ></span>
          </div>

          <div class="action-group action-group-intel">
            <button
              class="refresh-btn refresh-btn-intelligent"
              id="refresh-intelligent-btn"
              title="Intelligent refresh — invalidates stack-name cache and regenerates recommendations (uses Claude tokens)"
            >
              🧠 Intelligent
            </button>
            <span
              class="freshness intel-freshness"
              id="intel-freshness"
              title="Last intelligent refresh"
            ></span>
          </div>
        </div>
      </header>

      <div class="layout">
        <aside class="sidebar" id="sidebar">
          <nav class="jump-nav" id="jump-nav"></nav>
        </aside>

        <main class="main-col">
          <div class="summary" id="summary"></div>
          <div
            id="error-banner"
            class="error-banner"
            style="display: none"
          ></div>

          <section id="active-section">
            <h2>Active stacks</h2>
            <div id="active-stacks"></div>
          </section>

          <section id="merged-section" style="display: none">
            <h2>Merged stacks <span class="muted">(marked complete)</span></h2>
            <div id="merged-stacks"></div>
          </section>

          <section id="untouched-section" style="display: none">
            <h2>
              Untouched Jira
              <span class="section-controls" id="sprint-filter-wrap"></span>
            </h2>
            <table class="jira">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Key</th>
                  <th>Type</th>
                  <th>Title</th>
                  <th>Sprint</th>
                  <th>Updated</th>
                  <th title="Working on it today">Today</th>
                  <th>Remarks</th>
                </tr>
              </thead>
              <tbody id="untouched-rows"></tbody>
            </table>
          </section>

          <section id="stale-section" style="display: none">
            <h2>Stale worktrees — safe to delete</h2>
            <div class="stale-worktrees" id="stale-list"></div>
          </section>

          <section id="recs-section">
            <h2 class="recs-h">
              Recommendations
              <span class="recs-meta muted" id="recs-meta"></span>
              <button
                class="refresh-btn recs-refresh-btn"
                id="recs-refresh-btn"
                title="Regenerate via Claude (uses tokens)"
              >
                ⟳ Generate
              </button>
            </h2>
            <ol class="recs" id="recs-list">
              <li class="empty muted">
                No recommendations yet — click <strong>⟳ Generate</strong> to
                ask Claude.
              </li>
            </ol>
          </section>

          <footer><span id="footer-text">Loading…</span></footer>
        </main>

        <aside class="notepad" id="notepad">
          <div class="notepad-header">
            <span>📓 Notepad</span>
            <span class="notepad-saved" id="notepad-saved">saved</span>
          </div>
          <div class="notepad-body">
            <div
              class="notepad-content"
              id="notepad-content"
              data-md-key="dashboard.notepad"
            ></div>
          </div>
        </aside>
      </div>
    </div>
    <script src="/app.js"></script>
  </body>
</html>
