<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Live dashboard</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/styles.css" />
    <script src="/marked.min.js" defer></script>
    <script>
      // Apply persisted theme override before first paint to avoid a FOUC
      // (flash of OS-default theme then snap to user's choice). Reads the
      // raw key so we don't need an ES-module roundtrip here.
      (function () {
        var t = localStorage.getItem("dashboard.theme");
        if (t === "light" || t === "dark") {
          document.documentElement.setAttribute("data-theme", t);
        }
      })();
    </script>
  </head>
  <body>
    <div class="wrap">
      <header class="top">
        <div class="top-title">
          <h1>Live dashboard</h1>
          <span class="date" id="meta-date">…</span>
        </div>

        <div class="top-actions">
          <div class="action-group">
            <button
              class="refresh-btn"
              id="collapse-all-btn"
              title="Toggle all stack cards (open/closed)"
            >
              ⊟ Collapse all
            </button>
            <button
              class="refresh-btn"
              id="toggle-notepad-btn"
              title="Hide the right-side notepad to give the main column more room"
            >
              📓 Hide notepad
            </button>
            <button
              class="refresh-btn"
              id="toggle-theme-btn"
              title="Cycle theme: Auto (follow OS) → Light → Dark → Auto"
            >
              💻 Auto
            </button>
            <button
              class="refresh-btn"
              id="refresh-btn"
              title="Refresh data (no Claude calls — same as auto)"
            >
              ↻ Refresh
            </button>
            <label
              class="auto-toggle"
              title="Auto-refresh every 10 minutes (data only, no Claude)"
            >
              <input type="checkbox" id="auto-refresh-cb" checked />
              <span>Auto</span>
              <select id="auto-refresh-interval" aria-label="Auto-refresh interval">
                <option value="60000">1 min</option>
                <option value="300000">5 min</option>
                <option value="600000" selected>10 min</option>
                <option value="1800000">30 min</option>
              </select>
            </label>
            <span
              class="freshness"
              id="freshness"
              title="Last data refresh"
            ></span>
          </div>

          <div class="action-group action-group-intel">
            <button
              class="refresh-btn refresh-btn-intelligent"
              id="refresh-intelligent-btn"
              title="Intelligent refresh — invalidates stack-name cache and regenerates action items (uses Claude tokens)"
            >
              🧠 Intelligent
            </button>
            <span
              class="freshness intel-freshness"
              id="intel-freshness"
              title="Last intelligent refresh"
            ></span>
          </div>
        </div>
      </header>

      <div class="layout">
        <aside class="sidebar" id="sidebar">
          <nav class="jump-nav" id="jump-nav"></nav>
        </aside>

        <main class="main-col">
          <div class="summary" id="summary"></div>
          <div
            id="error-banner"
            class="error-banner"
            style="display: none"
          ></div>

          <section id="active-section">
            <h2>Active stacks</h2>
            <div id="active-stacks"></div>
          </section>

          <section id="merged-section" style="display: none">
            <h2>Merged stacks <span class="muted">(marked complete)</span></h2>
            <div id="merged-stacks"></div>
          </section>

          <section id="untouched-section" style="display: none">
            <h2>
              Jira
              <span
                class="help-icon"
                title="Jira tickets assigned to you. Default view hides tickets that already have an active PR stack — switch the Stack filter to 'With stack' or 'All' to see them."
              >ⓘ</span>
              <span class="section-controls">
                <span id="stack-filter-wrap"></span>
                <span id="sprint-filter-wrap"></span>
              </span>
            </h2>
            <table class="jira">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Key</th>
                  <th>Type</th>
                  <th>Title</th>
                  <th title="Click to change the ticket's state. The dropdown lists valid transitions for this ticket's current state.">State</th>
                  <th>Sprint</th>
                  <th title="The active PR stack this ticket is attached to (if any). Click to scroll to that stack's card.">Stack</th>
                  <th>Updated</th>
                  <th title="Notes you write here automatically migrate to a stack's Remarks once you open a PR stack tagged with this Jira key — annotated with '↳ from REV-XXXX'. Markdown supported.">Remarks</th>
                </tr>
              </thead>
              <tbody id="untouched-rows"></tbody>
            </table>
          </section>

          <section id="stale-section" style="display: none">
            <h2>
              Stale worktrees — safe to delete
              <span
                class="help-icon"
                title="Worktrees whose branch was merged, closed, or no longer has unique commits vs main. Use the copy button to remove them locally."
              >ⓘ</span>
            </h2>
            <div class="stale-worktrees" id="stale-list"></div>
          </section>

          <section id="recs-section">
            <h2 class="recs-h">
              Action items
              <span
                class="help-icon"
                title="Claude-generated next-action suggestions based on your stack state, review comments, and recent activity. Persists across refreshes — click ⟳ Generate to regenerate (uses Claude tokens)."
              >ⓘ</span>
              <span class="recs-meta muted" id="recs-meta"></span>
              <button
                class="refresh-btn recs-refresh-btn"
                id="recs-refresh-btn"
                title="Regenerate via Claude (uses tokens)"
              >
                ⟳ Generate
              </button>
            </h2>
            <ol class="recs" id="recs-list">
              <li class="empty muted">
                No action items yet — click <strong>⟳ Generate</strong> to
                ask Claude.
              </li>
            </ol>
          </section>

          <footer><span id="footer-text">Loading…</span></footer>
        </main>

        <aside class="notepad" id="notepad">
          <div class="notepad-header">
            <span class="notepad-title">
              📓 Notepad
              <span
                class="help-icon"
                title="Local-only scratchpad. Saved to this browser's localStorage — doesn't sync to the server or to other browsers. Markdown supported (Cmd+B, Cmd+I, Cmd+K wrap selection)."
              >ⓘ</span>
            </span>
            <span class="notepad-saved" id="notepad-saved">saved</span>
          </div>
          <div class="notepad-body">
            <div
              class="notepad-content"
              id="notepad-content"
              data-md-key="dashboard.notepad"
            ></div>
          </div>
        </aside>
      </div>
    </div>
    <script type="module" src="/app/main.js"></script>
  </body>
</html>
